<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha — Cabal Réquiem</title>
    <meta name="author" content="William Corrêa">
    <meta name="copyright" content="© 2026 Cabal Réquiem">
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="Themes/Dark/style.css">
    <script src="Themes/Dark/script.js" defer></script>
    <script>
        (function() {
            document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
            document.addEventListener('keydown', function(e) {
                if (e.ctrlKey || e.keyCode === 123) {
                    if ([85, 83, 80, 73].includes(e.keyCode) || e.keyCode === 123) {
                        e.preventDefault(); return false;
                    }
                }
                if (e.ctrlKey && e.shiftKey && e.keyCode === 73) { e.preventDefault(); return false; }
            });
            document.addEventListener('selectstart', function(e) { e.preventDefault(); return false; });
            document.addEventListener('dragstart', function(e) { e.preventDefault(); return false; });
            if (window.top !== window.self) { window.top.location.href = window.self.location.href; }
            document.addEventListener('keyup', function(e) { if (e.keyCode === 123) e.preventDefault(); });
            document.addEventListener('copy', function(e) { e.preventDefault(); return false; });
        })();
    </script>
</head>
<body>
    <main class="auth-page">
        <div class="auth-card">
            <div class="auth-card__header">
                <i class="fas fa-key"></i>
                <h1>Recuperar Senha</h1>
            </div>
            <div class="auth-card__body">
                <form action="recover.html" method="GET">
                    <div class="form-group">
                        <label class="form-label">E-mail</label>
                        <input type="email" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Código Pessoal</label>
                        <input type="text" class="form-input" required minlength="4" maxlength="20">
                    </div>
                    <button type="submit" class="form-btn"><i class="fas fa-key"></i> Enviar Link de Recuperação</button>
                </form>
            </div>
            <div class="auth-card__footer">
                <p>Lembrou da senha?</p>
                <a href="login.html" class="auth-card__link"><i class="fas fa-sign-in-alt"></i> Entrar</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <img src="Imagens/Logo.png" alt="Cabal Réquiem" style="width:80px;">
            <p class="footer__copy">© 2026 Cabal Réquiem — Todos os direitos reservados.</p>
            <p class="footer__dev">Desenvolvido por Wonka</p>
            <nav class="footer__nav">
                <a href="login.html">Entrar</a>
                <a href="register.html">Criar conta</a>
                <a href="ranking.html">Rankings</a>
            </nav>
        </div>
    </footer>
</body>
</html>
