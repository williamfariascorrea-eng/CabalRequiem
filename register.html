<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta — Cabal Réquiem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="Themes/Dark/style.css">
</head>
<body>
    <main class="auth-page">
        <div class="auth-card">
            <div class="auth-card__hero" style="text-align:center;padding:20px;">
                <img src="Imagens/Logo.png" alt="" style="width:120px;margin:0 auto;opacity:0.7;filter:drop-shadow(0 0 15px rgba(0,163,255,0.3));">
            </div>
            <div class="auth-card__header">
                <i class="fas fa-user-plus"></i>
                <h1>Criar Nova Conta</h1>
            </div>
            <div class="auth-card__body">
                <form action="register.php" method="POST">
                    <div class="form-group">
                        <label class="form-label">Nome da Conta</label>
                        <input type="text" class="form-input" required minlength="4" maxlength="16">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Senha</label>
                        <input type="password" class="form-input" required minlength="6" maxlength="16">
                    </div>
                    <div class="form-group">
                        <label class="form-label">E-mail</label>
                        <input type="email" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Nome Pessoal</label>
                        <input type="text" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Chave de Validação</label>
                        <input type="text" class="form-input" required>
                    </div>
                    <button type="submit" class="form-btn"><i class="fas fa-user-plus"></i> Registrar</button>
                </form>
            </div>
            <div class="auth-card__footer">
                <p>Já tem conta?</p>
                <a href="login.html" class="auth-card__link"><i class="fas fa-sign-in-alt"></i> Entrar</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <img src="Imagens/Logo.png" alt="Cabal Réquiem" style="width:80px;">
            <p class="footer__copy">© 2026 Cabal Réquiem — Todos os direitos reservados.</p>
            <p class="footer__dev">Desenvolvido por Wonka</p>
            <nav class="footer__nav">
                <a href="login.html">Entrar</a>
                <a href="register.html">Criar conta</a>
                <a href="ranking.html">Rankings</a>
            </nav>
        </div>
    </footer>
</body>
</html>
